<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMC — Dev</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #0d1b2a;
      color: #faf8f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #c9a05a;
      border-radius: 8px;
    }
    h1 { font-size: 2rem; color: #c9a05a; margin-bottom: 0.5rem; }
    p  { font-size: 1rem; opacity: 0.7; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.3rem 0.8rem;
      background: #c9a05a22;
      border: 1px solid #c9a05a55;
      border-radius: 4px;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      color: #c9a05a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>CMC Centers</h1>
    <p>Development environment — deploy pipeline active</p>
    <span class="badge">dev.cmcenters.org</span>
  </div>
</body>
</html>
