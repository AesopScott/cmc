name: Deploy to CMC Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cmc-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 192.250.227.156
          username: cmcftp@cmcenters.org
          password: ${{ secrets.CMC_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./dist/
          server-dir: /public_html/dev/
          exclude: |
            **/.git*
            **/.git*/**
